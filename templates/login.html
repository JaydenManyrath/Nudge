{% extends "base.html" %}

{% block title %}Sign in - Nudge{% endblock %}
{% block page_title %}Sign in{% endblock %}

{% block content %}
{% set login_error = login_error | default(none) %}

<div class="auth-card">
    <h1>Sign in to Nudge</h1>
    {% if login_error %}
    <div class="banner banner-error" role="alert">{{ login_error }}</div>
    {% endif %}
    <form class="auth-form" method="post"
          action="{{ url_for('auth.login') if url_for is defined else '#' }}">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
</div>
{% endblock %}
