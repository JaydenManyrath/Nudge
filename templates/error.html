{% extends "base.html" %}

{% block title %}{{ code }} | Nudge{% endblock %}
{% block page_title %}{{ code }}{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">{{ code }}</div>
    <h1>{{ title }}</h1>
    <p class="error-message">{{ message }}</p>
    <a class="btn btn-primary" href="{{ home_url }}">{{ home_label }}</a>
</div>
{% endblock %}
