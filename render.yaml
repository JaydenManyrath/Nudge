services:
  - type: web
    name: nudge
    runtime: docker
    plan: free
    region: oregon
    numInstances: 1
    healthCheckPath: /auth/login
    envVars:
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      # Public URL of this deployment — used to build OAuth redirect URIs.
      - key: PUBLIC_BASE_URL
        value: https://nudge-xp6f.onrender.com
      # Free tier has no persistent disk, so SQLite lives in the ephemeral
      # container filesystem (default ./nudge.db) and re-seeds on each boot.
      # Login accounts are always seeded; "false" means no sample tasks, so the
      # board starts empty and you demo the real upload -> extract -> approve flow.
      - key: NUDGE_SEED_DEMO_DATA
        value: "false"
      # One-click "Enter as Manager / Employee" on the login page (no password).
      # Set to "false" to require real sign-in.
      - key: NUDGE_DEMO_MODE
        value: "true"
      - key: DUE_SOON_HOURS
        value: "24"
      # Real OpenAI extraction. Requires OPENAI_API_KEY to be set in the Render
      # dashboard (sync:false below). If extraction errors, the key is missing;
      # switch this back to "deterministic" for a keyless fallback.
      - key: NUDGE_EXTRACTION_BACKEND
        value: openai
      - key: OPENAI_EXTRACTION_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: ZOOM_CLIENT_ID
        sync: false
      - key: ZOOM_CLIENT_SECRET
        sync: false
      - key: ZOOM_SECRET_TOKEN
        sync: false
      - key: ZOOM_SCOPES
        value: cloud_recording:read:content
      - key: ZOOM_REDIRECT_URI
        value: https://nudge-xp6f.onrender.com/auth/zoom/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://nudge-xp6f.onrender.com/auth/google/callback
      - key: GOOGLE_CALENDAR_SCOPES
        value: https://www.googleapis.com/auth/calendar.events
      - key: SENDGRID_API_KEY
        sync: false
